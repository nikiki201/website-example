<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservations - Mee Noodle</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="logo">Mee Noodle</span>
        <p>Reservation management area</p>
      </div>
      <nav class="site-nav">
        <a href="/">Back to home</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section container reservations-section">
      <div class="section-header">
        <h2>Saved reservations</h2>
        <p>This page is reserved for restaurant managers. You can search and delete a reservation.</p>
      </div>

      <div class="reservations-topbar">
        <input id="reservation-search" type="search" placeholder="Search by name, email, date or time" aria-label="Reservation search" />
        <p id="reservation-count" class="reservation-count">Loading...</p>
      </div>

      <div id="reservation-empty" class="info-card" hidden>
        No reservations found yet.
      </div>

      <div class="reservations-grid" id="reservation-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; 2026 Mee Noodle. All rights reserved.</p>
      <p>Internal access for restaurant reservation management.</p>
    </div>
  </footer>

  <script src="reservations.js"></script>
</body>
</html>
