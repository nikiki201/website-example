<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2c5530" />
  <meta name="description" content="Mobile reservation management app - Mee Noodle" />

  <link rel="manifest" href="/manifest.json" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mee Noodle Admin" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <title>Mee Noodle Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="mobile-admin.css" />
</head>
<body>
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-header">
        <h1>Mee Noodle Admin</h1>
        <p>Reservation management</p>
      </div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Sign in
        </button>
      </form>

      <div id="login-error" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <div id="app-screen" class="app-screen" style="display: none;">
    <header class="mobile-header">
      <div class="header-content">
        <h1>Mee Noodle Admin</h1>
        <button id="logout-btn" class="btn-icon" title="Log out">
          <span>Exit</span>
        </button>
      </div>
    </header>

    <nav class="mobile-nav">
      <button class="nav-btn active" data-tab="reservations">
        Reservations
      </button>
      <button class="nav-btn" data-tab="stats">
        Stats
      </button>
    </nav>

    <main class="mobile-main">
      <div id="reservations-tab" class="tab-content active">
        <div class="tab-header">
          <div class="search-bar">
            <input type="search" id="mobile-search" placeholder="Search..." />
          </div>
          <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="today">Today</button>
            <button class="filter-btn" data-filter="upcoming">Upcoming</button>
          </div>
        </div>

        <div class="reservations-count">
          <span id="reservations-count-text">Loading...</span>
        </div>

        <div id="reservations-list" class="reservations-list"></div>

        <div id="empty-state" class="empty-state" style="display: none;">
          <div class="empty-icon">-</div>
          <h3>No reservations</h3>
          <p>New reservations will appear here.</p>
        </div>
      </div>

      <div id="stats-tab" class="tab-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">#</div>
            <div class="stat-content">
              <div class="stat-number" id="total-reservations">-</div>
              <div class="stat-label">Total reservations</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon">D</div>
            <div class="stat-content">
              <div class="stat-number" id="today-reservations">-</div>
              <div class="stat-label">Today</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon">G</div>
            <div class="stat-content">
              <div class="stat-number" id="total-guests">-</div>
              <div class="stat-label">Total guests</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon">A</div>
            <div class="stat-content">
              <div class="stat-number" id="avg-guests">-</div>
              <div class="stat-label">Average guests</div>
            </div>
          </div>
        </div>

        <div class="chart-placeholder">
          <div class="chart-icon">-</div>
          <p>Detailed charts are available in the full version.</p>
        </div>
      </div>
    </main>

    <div id="reservation-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Reservation details</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div id="reservation-details" class="modal-body"></div>
        <div class="modal-footer">
          <button id="edit-reservation-btn" class="btn btn-primary">Edit</button>
          <button id="delete-reservation-btn" class="btn btn-danger">Delete</button>
          <button class="btn btn-secondary modal-close">Close</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" style="display: none;">
      <span id="toast-message"></span>
    </div>
  </div>

  <script src="mobile-admin.js"></script>
</body>
</html>
